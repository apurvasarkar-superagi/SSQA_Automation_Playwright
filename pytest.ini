[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = sales/scr

# BDD feature files location
bdd_features_base_dir = sales/scr

# Options
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=sales/Reports/report.html
    --self-contained-html
    --junitxml=sales/Reports/junit.xml

# Markers
markers =
    signIn: Sign in related tests
    signIn_1: Sign in scenario 1
    signUp: Sign up related tests
    smoke: Smoke tests
    regression: Regression tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

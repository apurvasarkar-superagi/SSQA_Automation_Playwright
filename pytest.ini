[pytest]
addopts = --tb=short -q
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
    ignore::pytest.PytestWarning

markers =
    signIn: sign in tests
    signIn_1: sign in test variant 1
    signIn_2: sign in test variant 2
    settings: settings tests
    settings_1: settings test variant 1
    not_automated: tests not yet automated
